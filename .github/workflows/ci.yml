name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: lint · build-drift · JS unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build:check   # committed deck.html must equal a fresh build
      - run: npm run test:js

  python:
    name: Python unit + HTTP e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: pytest -q

  browser-e2e:
    name: Playwright browser e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:check
      - run: npx playwright test
